<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FE RTB Ping</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>MarketWave RTB</h1>

        <p class="subtitle">
            Enter Caller Information
        </p>

        <form id="leadForm">

            <div class="form-group">

                <label>Caller ID</label>

                <input
                    type="text"
                    id="caller_id"
                    placeholder="+14155550123"
                    required>

            </div>

            <div class="form-group">

                <label>ZIP Code</label>

                <input
                    type="text"
                    id="zipcode"
                    maxlength="5"
                    placeholder="33101"
                    required>

            </div>

            <div class="form-group">

                <label>State</label>

                <select id="state" required>

                    <option value="">Select State</option>

                    <option>AL</option>
                    <option>AK</option>
                    <option>AZ</option>
                    <option>AR</option>
                    <option>CA</option>
                    <option>CO</option>
                    <option>CT</option>
                    <option>DE</option>
                    <option>FL</option>
                    <option>GA</option>
                    <option>HI</option>
                    <option>ID</option>
                    <option>IL</option>
                    <option>IN</option>
                    <option>IA</option>
                    <option>KS</option>
                    <option>KY</option>
                    <option>LA</option>
                    <option>ME</option>
                    <option>MD</option>
                    <option>MA</option>
                    <option>MI</option>
                    <option>MN</option>
                    <option>MS</option>
                    <option>MO</option>
                    <option>MT</option>
                    <option>NE</option>
                    <option>NV</option>
                    <option>NH</option>
                    <option>NJ</option>
                    <option>NM</option>
                    <option>NY</option>
                    <option>NC</option>
                    <option>ND</option>
                    <option>OH</option>
                    <option>OK</option>
                    <option>OR</option>
                    <option>PA</option>
                    <option>RI</option>
                    <option>SC</option>
                    <option>SD</option>
                    <option>TN</option>
                    <option>TX</option>
                    <option>UT</option>
                    <option>VT</option>
                    <option>VA</option>
                    <option>WA</option>
                    <option>WV</option>
                    <option>WI</option>
                    <option>WY</option>

                </select>

            </div>

            <button id="submitBtn" type="submit">

                Request DID

            </button>

        </form>

        <div id="loading">

            <div class="spinner"></div>

            Requesting Available Buyer...

        </div>

        <div id="result"></div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
